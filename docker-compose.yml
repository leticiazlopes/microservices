services:
  db:
    image: mysql:8.0
    container_name: microservices_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: order_db
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  payment:
    build:
      context: ..
      dockerfile: microservices/payment/Dockerfile
    container_name: payment_service
    ports:
      - "3001:3001"
    environment:
      - DATA_SOURCE_URL=root:root@tcp(db:3306)/order_db
      - APPLICATION_PORT=3001
      - ENV=dev
    depends_on:
      db:
        condition: service_healthy

  shipping:
    build:
      context: ..
      dockerfile: microservices/shipping/Dockerfile
    container_name: shipping_service
    ports:
      - "3002:3002"
    environment:
      - DATA_SOURCE_URL=root:root@tcp(db:3306)/order_db
      - APPLICATION_PORT=3002
      - ENV=dev
    depends_on:
      db:
        condition: service_healthy

  order:
    build:
      context: ..
      dockerfile: microservices/order/Dockerfile
    container_name: order_service
    ports:
      - "3000:3000"
    environment:
      - DATA_SOURCE_URL=root:root@tcp(db:3306)/order_db
      - PAYMENT_SERVICE_URL=payment:3001
      - SHIPPING_SERVICE_URL=shipping:3002
      - APPLICATION_PORT=3000
      - ENV=dev
    depends_on:
      db:
        condition: service_healthy
      payment:
        condition: service_started
      shipping:
        condition: service_started

volumes:
  db_data: {}